[build]
builder = "dockerfile"

[deploy]
healthcheckPath = "/setup/healthz"
healthcheckTimeout = 300
restartPolicyType = "on_failure"

# Require a persistent volume mounted at /data (Railway).
requiredMountPath = "/data"

[variables]
# NOTE: Railway injects PORT automatically.
# Do not set PORT here; Railway templates may not apply it reliably and hardcoding
# can cause domain routing mismatches.
OPENCLAW_STATE_DIR = "/data/.openclaw"
OPENCLAW_WORKSPACE_DIR = "/data/workspace"

# Tailscale — set TS_AUTHKEY in the Railway dashboard (reusable + ephemeral key
# from https://login.tailscale.com/admin/settings/keys). Without it the container
# skips tailnet bootstrap and the Discord voice bot falls back to local whisper.cpp.
TS_HOSTNAME = "openclaw-railway"

# Discord voice transcription (primary: Wyoming on tailnet home lab)
WYOMING_HOST = "100.119.224.128"
WYOMING_PORT = "10300"
WHISPER_CPP_URL = "http://127.0.0.1:8723/inference"
DISCORD_VOICE_ROOT = "/data/workspace/voice"
DISCORD_VOICE_CHUNK_SEC = "10"
DISCORD_VOICE_LANGUAGE = "auto"
# Concurrency intent: ship engine + orchestrator pilots target ~10 in-flight tickets.
# NOTE: As of this commit, neither openclaw core nor the orchestrator skill consumes
# MAX_IN_FLIGHT — this var is INTENT-ONLY and documents the desired ceiling. When
# upstream wires it up (or we add it to the orchestrator), this value takes effect.
MAX_IN_FLIGHT = "10"
